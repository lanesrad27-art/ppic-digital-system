# ─────────────────────────────────────────────────────────────
# PPIC Digital System — contoh konfigurasi rahasia
# Salin file ini menjadi .streamlit/secrets.toml lalu isi nilainya.
# JANGAN commit secrets.toml (sudah masuk .gitignore).
# ─────────────────────────────────────────────────────────────

# Password admin awal. INI KEY TOP-LEVEL (dibaca via st.secrets["default_admin_password"]).
# - Bila diisi, user 'admin' dibuat otomatis saat database pertama diinisialisasi.
# - Bila dikosongkan, buat admin pertama lewat halaman System Health atau langsung di DB.
# Catatan TOML: key top-level harus ditulis SEBELUM section [database] di bawah.
default_admin_password = ""

[database]
# ── Opsi A (disarankan): satu connection string penuh ──
# Jika 'url' diisi, parameter terpisah di bawah diabaikan.
# url = "postgresql+psycopg2://user:password@host:5432/ppic_db"

# ── Opsi B: parameter terpisah (dipakai bila 'url' tidak diisi) ──
host = "localhost"
port = 5432
dbname = "ppic_db"
user = "ppic_user"
password = "ganti_dengan_password"
